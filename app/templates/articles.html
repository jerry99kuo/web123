<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有文章 - 郭兆軒的個人網站</title>
    <!-- 引入與首頁一致的字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            /* 完美同步首頁的 Modern Developer Dark 配色 */
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --bg-hover: #262626;
            --text-primary: #ededed;
            --text-secondary: #a1a1aa;
            --accent-color: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.1);
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body { 
            font-family: var(--font-sans); 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 頂部導覽列 --- */
        .top-nav {
            background-color: var(--bg-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .top-nav a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: var(--accent-color);
        }

        /* --- 清單外框容器 --- */
        .list-container {
            max-width: 850px;
            margin: 0 auto;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- 清單標頭 --- */
        .list-header {
            background-color: rgba(255, 255, 255, 0.02);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .badge-custom {
            background-color: var(--bg-hover);
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-family: var(--font-mono);
            font-weight: 500;
        }

        /* --- 單篇章的橫列項目 --- */
        .article-item {
            display: flex;
            align-items: flex-start;
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .article-item:last-child {
            border-bottom: none; 
        }

        .article-item:hover {
            background-color: var(--bg-hover);
            /* 讓左側出現微光亮條的設計巧思 */
            box-shadow: inset 3px 0 0 var(--accent-color);
        }

        /* --- 標題與圖示 --- */
        .article-icon {
            color: var(--text-secondary);
            font-size: 1.4rem;
            margin-right: 18px;
            margin-top: 2px;
            transition: color 0.2s;
        }

        .article-item:hover .article-icon {
            color: var(--accent-color);
        }

        .article-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .article-item:hover .article-title {
            color: var(--accent-color); 
        }

        /* --- 摘要與中繼資料 --- */
        .article-summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .article-meta {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #71717a;
        }

        /* --- 頁尾 --- */
        footer { 
            text-align: center; 
            padding: 50px 20px 30px; 
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            max-width: 850px;
            margin: 60px auto 0;
        }
    </style>
</head>
<body>

    <!-- 頂部簡單導覽列 -->
    <div class="top-nav">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 850px; padding: 0;">
            <a href="/"><i class="bi bi-arrow-left-short fs-4 align-middle"></i> 返回首頁</a>
            <span class="badge badge-custom rounded-pill">郭兆軒的筆記庫</span>
        </div>
    </div>

    <section id="articles-list" style="padding: 0 20px 60px;">
        
        <!-- 清單主體 -->
        <div class="list-container">
            
            <div class="list-header">
                <span><i class="bi bi-journal-album me-2" style="color: var(--accent-color);"></i>所有文章</span>
                <span class="badge badge-custom rounded-pill">{{ data.articles | length }} 篇</span>
            </div>

            <!-- Jinja2：產生文章列表 -->
            {% for article in data.articles %}
            <a href="/article/{{ article.id }}" class="article-item">
                <div class="article-icon">
                    <i class="bi bi-file-earmark-text"></i>
                </div>
                <div>
                    <div class="article-title">{{ article.title }}</div>
                    <div class="article-summary">{{ article.summary }}</div>
                    <div class="article-meta">
                        <i class="bi bi-layers me-1"></i> 包含 {{ article.chapters | length }} 個集數章節
                    </div>
                </div>
            </a>
            {% endfor %}

            <!-- 沒有文章時的空狀態 -->
            {% if not data.articles %}
            <div class="text-center" style="padding: 80px 20px; color: var(--text-secondary);">
                <i class="bi bi-inbox fs-1 mb-3 d-block" style="color: #52525b;"></i>
                <p>目前還沒有文章，敬請期待...</p>
            </div>
            {% endif %}

        </div>

    </section>
    
    <footer>
        <p class="mb-1 fw-bold">持續更新網站</p>
        <p>&copy; 2026 Jerry Kuo. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
