<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 網頁標題也順便改一下 -->
    <title>{{ name }} - Life & Work</title>
    
    <!-- 引入字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- 沿用原本超有質感的暗黑風 CSS -->
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --bg-hover: #262626;
            --text-primary: #ededed;
            --text-secondary: #a1a1aa;
            --accent-color: #38bdf8; 
            --border-color: rgba(255, 255, 255, 0.1);
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.05em;
        }

        /* 新增一個副標題說明 */
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* 專案卡片網格 */
        .grid-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .card {
            display: block;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(56, 189, 248, 0.5);
            background: #1a1a1a;
            transform: translateY(-2px);
        }

        .card h3 {
            color: var(--text-primary);
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 16px;
            /* 讓多行文字也能漂亮呈現 */
            white-space: pre-wrap; 
        }

        .card-meta {
            display: flex;
            justify-content: flex-end;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-color);
        }

        /* 底部導覽按鈕 */
        .nav-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .btn-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-surface);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-custom:hover {
            background: var(--bg-hover);
            border-color: #52525b;
            color: white;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 🌟 把標題改成成就與紀錄 -->
      <h1>🏆 Life & Work</h1>
      <p class="subtitle">紀錄我的各種事件。</p>
      
      <div class="grid-section">
        {% for project in projects %}
        <a href="{{ project.link or '#' }}" class="card" target="_blank">
            <!-- 標題前加個小圖示，可以根據你的喜好調整 -->
            <h3><i class="bi bi-star-fill" style="color: #fbbf24; font-size: 1.1rem;"></i> {{ project.name }}</h3>
            <p>{{ project.desc }}</p>
            
            {% if project.link %}
            <div class="card-meta">
                <span>查看紀錄<i class="bi bi-arrow-right-short"></i></span>
            </div>
            {% endif %}
        </a>
        {% else %}
        <!-- 資料庫沒東西時的預設畫面 -->
        <div style="color: var(--text-secondary); text-align: center; padding: 40px; border: 1px dashed var(--border-color); border-radius: 12px;">
            目前還沒有新增紀錄，請至後台填寫！
        </div>
        {% endfor %}
      </div>

      <div class="nav-actions">
        <a href="/" class="btn-custom"><i class="bi bi-house"></i> 首頁</a>
        <a href="/contact" class="btn-custom"><i class="bi bi-envelope"></i> 聯絡我</a>
        <a href="/link" class="btn-custom"><i class="bi bi-link-45deg"></i> 相關連結</a>
      </div>
    </div>
  </body>
</html>
