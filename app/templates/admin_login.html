<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理員登入</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

    <style>
      :root {
        --primary-color: #60a5fa;
        --primary-hover: #3b82f6;
        --card-bg: rgba(17, 24, 39, 0.88);
        --text-main: #f9fafb;
        --text-muted: #9ca3af;
        --border-color: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top left,
            rgba(59, 130, 246, 0.22),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(168, 85, 247, 0.16),
            transparent 35%
          ),
          linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main.container {
        width: 100%;
        max-width: 420px;
        margin: 0;
      }

      article.login-card {
        padding: 36px 32px;
        border-radius: 24px;
        background: var(--card-bg);
        backdrop-filter: blur(18px);
        border: 1px solid var(--border-color);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .login-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: linear-gradient(135deg, #1d4ed8, #7c3aed);
        color: white;
        font-size: 30px;
        box-shadow: 0 14px 32px rgba(37, 99, 235, 0.35);
      }

      h2 {
        margin-bottom: 8px;
        text-align: center;
        color: var(--text-main);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin-bottom: 28px;
        text-align: center;
        color: var(--text-muted);
        font-size: 15px;
      }

      label {
        color: #e5e7eb;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input[type="password"] {
        height: 48px;
        border-radius: 14px;
        border: 1px solid #374151;
        background-color: rgba(15, 23, 42, 0.9);
        color: #f9fafb;
        transition: 0.2s ease;
      }

      input[type="password"]::placeholder {
        color: #6b7280;
      }

      input[type="password"]:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
        background-color: #020617;
      }

      button[type="submit"] {
        width: 100%;
        height: 48px;
        margin-top: 12px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: white;
        font-weight: 700;
        letter-spacing: 0.03em;
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.32);
        transition: 0.2s ease;
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #1d4ed8, #4338ca);
        box-shadow: 0 18px 36px rgba(37, 99, 235, 0.42);
      }

      button[type="submit"]:active {
        transform: translateY(0);
      }

      .error-message {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: rgba(127, 29, 29, 0.35);
        border: 1px solid rgba(248, 113, 113, 0.45);
        color: #fecaca;
        padding: 12px 14px;
        border-radius: 14px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 600;
      }

      .footer-text {
        margin-top: 24px;
        text-align: center;
        color: #6b7280;
        font-size: 13px;
      }

      @media (max-width: 480px) {
        article.login-card {
          padding: 30px 24px;
          border-radius: 20px;
        }

        h2 {
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <article class="login-card">
        <div class="login-icon">🔐</div>

        <h2>管理員登入</h2>
        <p class="subtitle">請輸入密碼以進入後台管理系統</p>

        {% if 'error' in request.query_params %}
        <div class="error-message">⚠️ 密碼錯誤，請重試。</div>
        {% endif %}

        <form action="/admin" method="post">
          <label for="password">密碼</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="請輸入管理員密碼"
            required
            autofocus
          />

          <button type="submit">登入後台</button>
        </form>

        <p class="footer-text">Admin Dashboard</p>
      </article>
    </main>
  </body>
</html>
